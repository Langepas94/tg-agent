name: AI code review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true
        type: number

permissions:
  contents: read
  issues: write
  models: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      github.event_name == 'pull_request_target' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/ai-review') ||
      startsWith(github.event.comment.body, '/review')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false
      - name: Resolve review command
        id: command
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if python3 .github/scripts/ai_review.py --check-command; then
            echo "accepted=true" >> "$GITHUB_OUTPUT"
          else
            echo "accepted=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Acknowledge review command
        if: github.event_name == 'issue_comment' && steps.command.outputs.accepted == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            })
      - name: Test review pipeline
        if: github.event_name != 'issue_comment' || steps.command.outputs.accepted == 'true'
        run: python3 -m unittest discover -s .github/scripts -p 'test_*.py'
      - name: Review pull request
        if: github.event_name != 'issue_comment' || steps.command.outputs.accepted == 'true'
        env:
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
          AI_REVIEW_BASE_URL: ${{ vars.AI_REVIEW_BASE_URL }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL }}
          AI_REVIEW_LANGUAGE: ${{ vars.AI_REVIEW_LANGUAGE }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
        run: python3 .github/scripts/ai_review.py
